{% extends "base.html" %}
{% block title %}Hapus Merek{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
  <div class="rounded-lg border border-red-200 bg-white p-6 shadow-sm dark:border-red-800 dark:bg-slate-800">
    <h1 class="text-xl font-bold text-red-700 dark:text-red-400">Hapus Merek</h1>
    <p class="mt-3 text-sm">Yakin ingin menghapus <span class="font-semibold">{{ object }}</span>? Tindakan ini tidak dapat dibatalkan.</p>
    <form method="post" class="mt-5 flex items-center gap-3">
      {% csrf_token %}
      <button type="submit" class="rounded-md bg-red-600 px-4 py-2 font-medium text-white hover:bg-red-700">Ya, Hapus</button>
      <a href="{% url 'catalog:brand_list' %}" class="rounded-md border border-slate-300 px-4 py-2 font-medium hover:bg-slate-100 dark:border-slate-600 dark:hover:bg-slate-800">Batal</a>
    </form>
  </div>
</div>
{% endblock %}
