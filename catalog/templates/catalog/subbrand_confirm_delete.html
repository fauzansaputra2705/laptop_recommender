{% extends "base.html" %}
{% block title %}Hapus Sub Brand{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
  <div class="card bg-base-100 shadow-md max-w-2xl">
    <div class="card-body">
      <h1 class="card-title text-xl mb-4">Konfirmasi Hapus</h1>

      <p class="mb-6">
        Apakah Anda yakin ingin menghapus Sub Brand
        <strong>{{ object.name }}</strong> ({{ object.brand.name }})?
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="flex gap-2">
          <button type="submit" class="btn btn-error">
            <i class="fa-solid fa-trash"></i> Ya, Hapus
          </button>
          <a href="{% url 'catalog:subbrand_list' %}" class="btn btn-ghost">
            Batal
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
